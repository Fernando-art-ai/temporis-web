<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Temporis — Operational Intelligence Ecosystem</title>
<style>
:root{
  --orange:#e8531f;--orange-2:#ff6a2b;--rust:#b8492a;
  --ink:#20242b;--ink-soft:#454b55;
  --paper:#f7f3ee;--paper-2:#fbf8f3;--white:#fff;
  --line:#e8dfd2;--muted:#7a7266;
  --sage:#8ea395;--sage-bg:#eef2ee;
  --navy:#2a3566;--navy-bg:#eef0f6;
  --purple:#6a4a8a;--purple-bg:#f1ecf5;
  --teal:#2f6f63;--teal-bg:#e9f1ef;
  --maroon:#8a2b23;
  --radius:16px;--wrap:1180px;
  --shadow:0 18px 50px rgba(32,36,43,.10);--shadow-sm:0 4px 16px rgba(32,36,43,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;color:var(--ink);background:var(--paper-2);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
h1,h2,h3,h4{line-height:1.08;letter-spacing:-.015em;font-weight:800}
.display{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:800;letter-spacing:-.02em;font-weight:900}
.wrap{max-width:var(--wrap);margin:0 auto;padding:0 24px}
.eyebrow{font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--orange)}
.section{padding:84px 0}
.center{text-align:center}.muted{color:var(--muted)}
.btn{display:inline-flex;align-items:center;gap:9px;font-weight:700;font-size:15px;padding:13px 24px;border-radius:999px;border:2px solid transparent;cursor:pointer;transition:transform .16s,box-shadow .16s,background .16s}
.btn-primary{background:var(--orange);color:#fff;box-shadow:0 8px 22px rgba(232,83,31,.30)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(232,83,31,.40)}
.btn-light{border-color:var(--line);color:var(--ink);background:var(--white)}
.btn-light:hover{border-color:var(--orange);color:var(--orange)}

/* logo */
.logo{display:inline-flex;align-items:center;gap:10px;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:800;font-size:21px;color:var(--ink)}
.logo .mark{width:32px;height:32px;flex:0 0 auto}

/* nav */
header{position:sticky;top:0;z-index:60;background:rgba(251,248,243,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
nav{display:flex;align-items:center;justify-content:space-between;height:68px;gap:16px}
.nav-links{display:flex;gap:24px;align-items:center}
.nav-links a{font-size:14.5px;font-weight:600;color:var(--ink-soft);transition:color .15s;cursor:pointer;position:relative}
.nav-links a:hover{color:var(--orange)}
.nav-links a.active{color:var(--ink)}
.nav-links a.active::after{content:"";position:absolute;left:0;right:0;bottom:-24px;height:3px;background:var(--orange);border-radius:3px 3px 0 0}
.nav-right{display:flex;align-items:center;gap:14px}
.lang{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--white)}
.lang button{border:0;background:none;padding:7px 11px;font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;transition:background .15s,color .15s}
.lang button.on{background:var(--orange);color:#fff}
.nav-cta{background:var(--orange);color:#fff;padding:10px 18px;border-radius:999px;font-weight:700;font-size:14px;cursor:pointer}
.nav-cta:hover{background:var(--orange-2)}
.burger{display:none;background:none;border:0;color:var(--ink);font-size:25px;cursor:pointer}

/* generic blocks */
.sec-head{max-width:740px;margin-bottom:40px}
.sec-head.center{margin:0 auto 40px}
.sec-head h1,.sec-head h2{font-size:clamp(30px,4.4vw,50px);margin:12px 0 14px}
.sec-head p{font-size:18px;color:var(--muted)}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-sm);transition:transform .18s,box-shadow .18s}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.card .num,.flip-face .num{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:800;font-size:15px;width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:#fff;margin-bottom:14px}
.card h4,.flip-front h4{font-size:17px;margin-bottom:8px}
.card p,.flip-front p{font-size:14.5px;color:var(--muted)}
.card ul,.flip-front ul{list-style:none;margin-top:10px;display:flex;flex-direction:column;gap:6px}
.card ul li,.flip-front ul li{font-size:13.5px;color:var(--ink-soft);padding-left:18px;position:relative}
.card ul li::before,.flip-front ul li::before{content:"";position:absolute;left:0;top:9px;width:7px;height:7px;border-radius:50%;background:var(--c,var(--orange))}
/* flip cards */
.flip-card{perspective:1500px;cursor:pointer}
.flip-inner{position:relative;width:100%;min-height:388px;transition:transform .65s cubic-bezier(.4,.15,.2,1);transform-style:preserve-3d}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-face{position:absolute;inset:0;display:flex;flex-direction:column;padding:22px;border-radius:var(--radius);border:1px solid var(--line);box-shadow:var(--shadow-sm);backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:auto}
.flip-front{background:var(--white)}
.flip-face .num{align-self:flex-start}
.flip-back{background:linear-gradient(160deg,#eef0f6,#e6eaf6);border-color:#d3d9ec;transform:rotateY(180deg)}
.flip-card:focus-visible{outline:none}
.flip-card:focus-visible .flip-face{box-shadow:0 0 0 3px rgba(42,53,102,.35)}
.flip-front .tapf{margin-top:auto;padding-top:10px;font-size:12px;font-weight:800;color:var(--orange);display:inline-flex;gap:6px;align-items:center}
.flip-tag{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--navy)}
.flip-back h4{font-size:18px;margin:6px 0 8px;color:var(--navy)}
.flip-back p.bl{font-size:13px;line-height:1.5;color:var(--ink-soft);margin-bottom:12px}
.flip-tile{display:flex;align-items:center;gap:12px;padding:9px 0;border-top:1px solid rgba(42,53,102,.12)}
.flip-tile .mini{width:62px;height:40px;flex:0 0 auto;border-radius:8px;background:#fff;border:1px solid #d3d9ec;display:block}
.flip-tile .lbl{font-size:12.5px;font-weight:700;color:var(--navy);line-height:1.25}
.flip-hint{margin-top:auto;padding-top:12px;font-size:12px;font-weight:800;color:var(--muted);display:inline-flex;align-items:center;gap:6px}
/* flip para los cuadros superiores (Estrategia/Prioridades/Operación) */
.flip-flow{flex:1 1 220px}
.flip-flow .flip-inner{min-height:224px}
.flip-flow .flip-face{padding:18px}
.flow-ic{width:40px;height:40px;border-radius:11px;background:var(--navy);color:#fff;display:grid;place-items:center;font-size:17px;margin-bottom:12px}
.flip-flow .flip-front h5{font-size:18px;font-weight:800;margin-bottom:4px;color:var(--ink)}
.flip-flow .flip-front small{color:var(--muted);font-size:14px}
.flow-row{display:flex;align-items:center;gap:9px;padding:6px 0;border-top:1px solid rgba(42,53,102,.12);font-size:12.5px;font-weight:700;color:var(--navy)}
.flow-row:first-of-type{border-top:0}
.flow-row .rn{width:22px;height:22px;border-radius:6px;background:var(--navy);color:#fff;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:800;font-size:11px;display:grid;place-items:center;flex:0 0 auto}
.flow-row .rd{width:9px;height:9px;border-radius:50%;background:var(--navy);flex:0 0 auto}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{font-size:13px;font-weight:600;padding:6px 12px;border-radius:999px;background:var(--paper);border:1px solid var(--line);color:var(--ink-soft)}
.chip.o{background:#fdeee7;border-color:#f6cdb9;color:#8a3b1c}

/* hero */
.hero{position:relative;background:radial-gradient(1100px 560px at 82% -8%,rgba(232,83,31,.16),transparent 60%),radial-gradient(800px 460px at 6% 118%,rgba(142,163,149,.18),transparent 55%),var(--paper);border-bottom:1px solid var(--line)}
.hero .wrap{padding:74px 24px 84px;display:grid;grid-template-columns:1.12fr .88fr;gap:48px;align-items:center}
.hero h1{font-size:clamp(38px,5.2vw,62px);margin:16px 0 18px}
.hero h1 .hl{color:var(--orange)}
.hero p.lead{font-size:19px;color:var(--ink-soft);max-width:560px}
.cta-row{display:flex;gap:14px;margin-top:28px;flex-wrap:wrap}
.formula{display:inline-flex;flex-wrap:nowrap;gap:7px;align-items:center;margin-top:30px;font-weight:800;font-size:13.5px}
.formula span{background:var(--white);border:1px solid var(--line);padding:6px 12px;border-radius:999px;white-space:nowrap}
.formula .eq{color:var(--orange);background:none;border:none;padding:0 1px}
.formula .res{background:var(--orange);border-color:var(--orange);color:#fff}
@media(max-width:560px){.formula{flex-wrap:wrap}}
.eco-card{background:var(--white);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:var(--shadow)}
.eco-card h4{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;font-weight:800}
.eco-layer{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:12px;margin-bottom:10px;font-weight:700;font-size:14.5px;border:1px solid var(--line)}
.eco-layer small{display:block;font-weight:500;font-size:12px;color:var(--muted)}
.eco-layer .ico{width:30px;height:30px;flex:0 0 auto;display:grid;place-items:center;border-radius:8px;font-size:15px;color:#fff}
.l-prod{background:#fdeee7;border-color:#f6cdb9}.l-exec{background:var(--navy-bg)}.l-intel{background:var(--purple-bg)}.l-data{background:var(--teal-bg)}
.eco-arrow{text-align:center;color:var(--orange);font-size:15px;margin:-2px 0 8px}

/* architecture */
.arch-stack{display:flex;flex-direction:column;gap:14px;max-width:940px;margin:0 auto}
.arch-row{display:grid;grid-template-columns:240px 1fr;gap:20px;align-items:center;background:var(--white);border:1px solid var(--line);border-left:5px solid var(--c,var(--orange));border-radius:14px;padding:18px 22px;box-shadow:var(--shadow-sm)}
.arch-row .lab{font-weight:800;font-size:16px}
.arch-row .lab small{display:block;font-weight:700;font-size:11.5px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.arch-note{text-align:center;margin-top:26px;color:var(--ink-soft);font-weight:700}
.arch-note b{color:var(--orange)}

/* product tag */
.prod-tag{display:inline-flex;align-items:center;gap:6px;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:800;font-size:26px}
.prod-tag .sup{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:700;font-weight:800;font-size:12px;letter-spacing:.1em;transform:translateY(-9px)}
.sup-one{color:var(--navy)}.sup-pro{color:var(--orange)}

/* flow */
.flow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px}
.flow .step{flex:1 1 180px;background:var(--white);border:1px solid var(--line);border-radius:14px;padding:18px;display:flex;gap:14px;align-items:center;box-shadow:var(--shadow-sm)}
.flow .step .n{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:800;color:#fff;width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto;font-size:16px;background:var(--navy)}
.flow .step h5{font-size:15px;margin-bottom:2px}
.flow .step small{color:var(--muted);font-size:13px}
.flow .sep{align-self:center;color:var(--orange);font-size:22px;font-weight:800}

/* metrics */
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:16px;margin-top:24px}
.metric{border-radius:14px;padding:20px;border:1px solid var(--line);border-top:4px solid var(--c)}
.metric h5{font-size:16px;margin-bottom:6px;color:var(--c)}
.metric .kpi{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:800;font-size:13px;color:var(--ink)}
.metric p{font-size:13px;color:var(--ink-soft);margin-top:6px}
.metric.m1{--c:var(--navy);background:var(--navy-bg)}.metric.m2{--c:var(--purple);background:var(--purple-bg)}.metric.m3{--c:var(--teal);background:var(--teal-bg)}
.metric.m-blue{--c:var(--navy);background:var(--navy-bg)}
.metric.m-green{--c:var(--teal);background:var(--teal-bg)}
.metric.m-red{--c:var(--maroon);background:#f6e9e7}
.rel-formula{max-width:520px;margin:16px auto 20px;text-align:center;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:800;font-size:14.5px;letter-spacing:.01em;color:var(--maroon);background:#fbf3e7;border:1px solid #ecd9b0;border-radius:10px;padding:11px 16px}
.rel-seq{display:flex;align-items:stretch;gap:12px}
.rel-inputs{display:flex;align-items:stretch;gap:12px;flex:2.2 1 0}
.rel-inputs>.flip-rel{flex:1 1 0}
.rel-plus{align-self:center;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:800;font-size:22px;color:var(--muted)}
.rel-arrow{display:flex;align-items:center;font-size:26px;color:var(--orange);font-weight:800;flex:0 0 auto}
.rel-seq>.flip-rel{flex:1.05 1 0}
.rel-seq>.flip-rel.rel-x{flex:1.18 1 0}
.flip-rel .flip-inner{min-height:224px}
.flip-rel .flip-face{padding:20px}
.rel-front{background:var(--white);border:1px solid var(--line)}
.rel-front h5{font-size:18px;font-weight:800;color:var(--ink);margin-bottom:6px}
.rel-front .kpi{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:800;font-size:12px;letter-spacing:.02em;color:var(--ink-soft);margin-bottom:8px}
.rel-front p{font-size:14px;color:var(--muted);margin:0}
.rel-front ul{list-style:none;display:flex;flex-direction:column;gap:6px;margin-top:2px}
.rel-front li{font-size:13.5px;color:var(--ink-soft);padding-left:18px;position:relative;font-weight:600}
.rel-front li::before{content:"";position:absolute;left:0;top:9px;width:7px;height:7px;border-radius:50%;background:var(--navy)}
/* layer final · resultados */
.res-wrap{margin-top:56px}
.res-tag{font-size:11.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--navy);background:var(--navy-bg);border:1px solid #d3d9ec;border-radius:999px;padding:7px 15px;display:inline-block;margin:0 0 15px}
.res-tag.bench{color:var(--rust);background:#fdeee7;border-color:#f6cdb9}
.res-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.res-card{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:var(--shadow-sm);text-align:center;display:flex;flex-direction:column;justify-content:center;min-height:132px}
.res-card .rc-name{font-weight:800;font-size:14px;color:var(--ink);margin-bottom:9px}
.res-card .rc-ba{font-size:13.5px;color:var(--muted);font-weight:700}
.res-card .rc-ba b{color:var(--ink)}
.res-card .rc-arrow{color:var(--orange);font-weight:800;margin:0 4px}
.res-card .rc-delta{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:800;font-size:26px;color:var(--orange);line-height:1;margin-top:9px}
.bench-card .bn{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:800;font-size:clamp(24px,3.2vw,34px);color:var(--orange);line-height:1}
.bench-card p{font-size:13px;color:var(--muted);font-weight:600;margin-top:8px}
.flip-res .flip-inner{min-height:224px}
.flip-res .flip-face{padding:20px}
.flip-res .res-card{justify-content:flex-start;box-shadow:none}
.res-dec{margin-top:2px}
.res-dec .dl{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--navy)}
.res-dec ul{list-style:none;margin-top:6px;display:flex;flex-direction:column;gap:5px}
.res-dec li{font-size:12.5px;color:var(--ink-soft);padding-left:16px;position:relative;font-weight:600;line-height:1.35}
.res-dec li::before{content:"";position:absolute;left:0;top:8px;width:6px;height:6px;border-radius:50%;background:var(--navy)}
@media(max-width:900px){.res-grid{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.res-grid{grid-template-columns:1fr}}
.res-grid.g5{grid-template-columns:repeat(5,1fr)}
@media(max-width:1000px){.res-grid.g5{grid-template-columns:repeat(3,1fr)}}
@media(max-width:640px){.res-grid.g5{grid-template-columns:1fr 1fr}}
/* banda diferenciador ONE vs PRO */
.diff{background:linear-gradient(160deg,#fff6f0,#fdeadf);border:1px solid #f6cdb9;border-radius:18px;padding:28px;margin:46px 0 8px}
.diff h3{font-size:clamp(19px,2.5vw,25px);margin:8px 0 10px;max-width:840px}
.diff>p{color:var(--ink-soft);font-size:15.5px;max-width:840px;margin-bottom:20px}
.diff-steps{display:flex;gap:10px;flex-wrap:wrap;align-items:stretch}
.diff-step{flex:1 1 170px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.diff-step .ds-t{font-weight:800;font-size:15px;color:var(--ink)}
.diff-step small{color:var(--muted);font-size:13px;display:block;margin-top:3px}
.diff-step.hl{border-color:var(--orange);box-shadow:0 6px 16px rgba(232,83,31,.14)}
.diff-step.hl .ds-t{color:var(--orange)}
.diff-arrow{align-self:center;color:var(--orange);font-weight:800;font-size:20px}
@media(max-width:760px){.diff-steps{flex-direction:column}.diff-arrow{transform:rotate(90deg);align-self:flex-start}}
/* integraciones */
.integ-band{display:flex;flex-wrap:wrap;gap:16px 30px;justify-content:center;align-items:center;background:var(--white);border:1px solid var(--line);border-radius:16px;padding:26px 28px;box-shadow:var(--shadow-sm)}
.integ-chip{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:800;font-size:19px;color:var(--ink);opacity:.82;letter-spacing:.01em}
/* roadmap */
.rmap-assets{display:flex;flex-wrap:wrap;gap:8px 4px;justify-content:center;align-items:center;margin-bottom:32px}
.rmap-asset{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:13px;color:var(--ink-soft)}
.rmap-asset .rn{width:22px;height:22px;border-radius:50%;color:#fff;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:800;font-size:11px;display:grid;place-items:center;flex:0 0 auto}
.rmap-sep{color:var(--orange);font-weight:800;margin:0 8px}
.rmap-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
.rmap-card{background:var(--white);border:1px solid var(--line);border-top:5px solid var(--c);border-radius:14px;padding:20px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column}
.rmap-top{display:flex;justify-content:center;align-items:center}
.rmap-card .ph{font-size:11px;font-weight:800;letter-spacing:.08em;color:var(--c);text-transform:uppercase}
.rmap-card h4{font-size:15.5px;margin:10px 0 2px}
.rmap-card .layer{font-size:11px;font-weight:800;color:var(--c);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.rmap-card p{font-size:13px;color:var(--muted)}
.rmap-out{margin-top:12px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12.5px;font-weight:600;color:var(--ink)}
.rmap-out b{display:block;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;font-weight:800}
.rmap-prod{margin-top:auto;padding-top:12px;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:800;font-size:14px;color:var(--c);text-align:center}
@media(max-width:600px){.rmap-foot{white-space:normal}}
/* clientes */
.cli-head{min-height:52px;display:flex;align-items:center;margin-bottom:6px}
.cli-logo{max-height:48px;max-width:170px;object-fit:contain}
.cli-logo.cli-ccu{max-height:36px}
.cli-name{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:800;font-size:26px;color:var(--ink);letter-spacing:.01em}
.cli-sector{font-size:11.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--orange);margin:2px 0 12px}
.cli-out{margin-top:12px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12.5px;font-weight:600;color:var(--ink)}
.cli-out b{display:block;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;font-weight:800}

/* company / insights */

.soon-badge{display:inline-block;font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--orange);background:#fdeee7;border:1px solid #f6cdb9;border-radius:999px;padding:4px 10px;margin-top:10px}
.biblio-card{display:flex;flex-direction:column;text-decoration:none;color:inherit;transition:border-color .15s,transform .15s}

@media(max-width:1000px){.rmap-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.rmap-grid{grid-template-columns:1fr}.rmap-sep{display:none}}

.plat-row .pl-lab{font-weight:800;font-size:17px;color:var(--c)}

.plat-chips{display:flex;flex-wrap:wrap;gap:8px}

@media(max-width:820px){.plat-row{grid-template-columns:1fr}.plat-scale{grid-template-columns:1fr 1fr}}

/* tarjetas de producto (Inicio) con flip */
.flip-prod .flip-inner{min-height:290px}
.flip-prod .flip-face{padding:26px 28px}

/* problem/solution */
.ps{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:36px}

/* loop */
.pro-loop{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}
.pro-loop .st{flex:1 1 170px;background:var(--white);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow-sm)}
.pro-loop .st .t{font-weight:800;font-size:14.5px;color:var(--orange);margin-bottom:4px}
.pro-loop .st small{color:var(--muted);font-size:13px}

/* timeline */
.time{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.phase{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow-sm);border-top:4px solid var(--orange)}

.phase small{color:var(--muted);font-size:12.5px;display:block}
.time-legend{display:flex;gap:20px;justify-content:center;margin-top:24px;flex-wrap:wrap;font-size:13.5px;font-weight:600;color:var(--muted)}
.time-legend span{display:inline-flex;align-items:center;gap:8px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}

/* stats */
.stats-band{background:var(--white);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.stat{text-align:center;padding:0 8px}

.stat p{font-size:14px;color:var(--muted);margin-top:8px;font-weight:600}

/* CTA / contact */
.cta{background:radial-gradient(900px 460px at 82% -20%,rgba(232,83,31,.16),transparent 60%),radial-gradient(700px 380px at 4% 120%,rgba(142,163,149,.16),transparent 55%),var(--paper);border-top:1px solid var(--line)}
.cta h1,.cta h2{font-size:clamp(30px,4.4vw,50px)}
.cta .hl{color:var(--orange)}
.contact-card{margin-top:32px;max-width:520px;background:var(--white);border:1px solid var(--line);border-left:5px solid var(--orange);border-radius:16px;padding:26px 28px;box-shadow:var(--shadow)}
.contact-card .name{font-weight:800;font-size:20px}
.contact-card .role{color:var(--orange);font-weight:800;font-size:13px;letter-spacing:.06em;text-transform:uppercase;margin:2px 0 16px}
.contact-card a{display:inline-flex;align-items:center;gap:10px;font-size:16px;color:var(--ink);margin-top:8px;font-weight:600}

.contact-card .row{display:flex;flex-direction:column;gap:6px}
.ic{width:30px;height:30px;border-radius:8px;background:#fdeee7;color:var(--orange);display:grid;place-items:center;font-size:15px;flex:0 0 auto}

/* two-col intro (product landing cards on home) */
.prodcards{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.prodcard{border-radius:18px;padding:28px;border:1px solid var(--line);background:var(--white);box-shadow:var(--shadow-sm);display:flex;flex-direction:column}
.prodcard.one{border-top:5px solid var(--navy)}
.prodcard.pro{border-top:5px solid var(--orange)}
.prodcard p{color:var(--muted);font-size:15px;margin:10px 0 16px}
.prodcard .k{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.prodcard .go{margin-top:auto;font-weight:800;color:var(--orange);font-size:14.5px;cursor:pointer}

/* footer */
footer{background:var(--ink);color:#a9adb5;padding:38px 0;font-size:14px}
footer .wrap{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}

footer .fnav{display:flex;gap:18px;flex-wrap:wrap}
footer .fnav a{color:#c3c7ce;cursor:pointer}
footer .fnav a:hover{color:#fff}

.reveal{opacity:0;transform:translateY(18px);transition:opacity .5s,transform .5s}
.reveal.in{opacity:1;transform:none}

@media (max-width:960px){
  .hero .wrap{grid-template-columns:1fr;padding-top:52px}
  .grid-3,.grid-4,.time,.stats,.prodcards,.ps{grid-template-columns:1fr 1fr}
  .metrics{grid-template-columns:1fr 1fr}.arch-row{grid-template-columns:1fr}

}

.hx-cli{display:inline-flex;align-items:center;font-weight:800;font-size:19px;color:var(--ink);opacity:.85}
/* auto-play keynote mode */
.hx.player > section{position:fixed;inset:0;height:100vh;min-height:100vh;display:grid;place-items:center;opacity:0;visibility:hidden;transition:opacity .8s ease;z-index:1;overflow-y:auto;padding:96px 24px}
.hx.player > section.hx-active{opacity:1;visibility:visible;z-index:2}
.hx.player .hx-pin{height:auto!important}
.hx.player .hx-stage{position:static;height:auto;min-height:0;padding:0}
.hx.player .hx-cue{display:none}
body.hx-playing footer{display:none}
.hx-prog{position:fixed;top:0;left:0;height:3px;width:0;background:var(--orange);z-index:75}
.hx-ctrl{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:75;display:flex;align-items:center;gap:6px;background:rgba(251,248,243,.92);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:999px;padding:6px 10px;box-shadow:0 6px 22px rgba(0,0,0,.08)}
.hx-ctrl button{border:none;background:none;cursor:pointer;font-size:16px;color:var(--ink);font-weight:800;padding:6px 12px;line-height:1;border-radius:999px}
.hx-ctrl button:hover{color:var(--orange);background:rgba(232,83,31,.08)}
.hx-ctrl .hx-snd.on{color:var(--orange);background:rgba(232,83,31,.12)}
.hx-ctrl-sep{width:1px;height:18px;background:var(--line);margin:0 2px}
.hx-mani{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:800;font-size:clamp(26px,4.4vw,52px);line-height:1.12;letter-spacing:-.01em;max-width:900px;margin:0 auto;color:#fff}
.hx-mani .em{color:var(--orange)}
.hx-claim{font-weight:800;font-size:clamp(15px,2vw,20px);color:#cfd3db;margin-top:30px;letter-spacing:.01em}
.hx-cta{display:inline-block;margin-top:26px;background:var(--orange);color:#fff;font-weight:800;font-size:15px;padding:16px 30px;border-radius:12px;text-decoration:none;cursor:pointer;transition:transform .15s,box-shadow .15s}
.hx-cta:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(232,81,30,.35)}
.hx-reduced .hx-reveal,.hx-reduced .hx-step,.hx-reduced .hx-role{opacity:1!important;transform:none!important;filter:none!important}
@media (prefers-reduced-motion:reduce){.hx-pulse,.hx-brain,.hx-cue span{animation:none}}
@media (max-width:560px){.hx-pin{height:auto!important}.hx-stage{position:relative;height:auto;min-height:100vh}}
/* ===== Conversion Layer ===== */
.conv-back{position:fixed;inset:0;z-index:200;background:rgba(18,22,28,.55);backdrop-filter:blur(6px);opacity:0;visibility:hidden;transition:opacity .3s ease;display:grid;place-items:center;padding:20px}
.conv-back.on{opacity:1;visibility:visible}
.conv-panel{position:relative;background:var(--white);border-radius:20px;width:100%;max-width:580px;max-height:92vh;overflow:auto;box-shadow:0 30px 80px rgba(0,0,0,.28);transform:translateY(16px) scale(.985);transition:transform .35s cubic-bezier(.2,.7,.2,1);padding:38px 40px}
.conv-back.on .conv-panel{transform:none}
.conv-close{position:absolute;top:15px;right:18px;border:none;background:none;font-size:24px;color:var(--muted);cursor:pointer;line-height:1;padding:4px 8px;border-radius:8px}
.conv-close:hover{color:var(--ink);background:var(--paper)}
.conv-eye{font-size:11.5px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--orange)}
.conv-title{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:800;font-size:clamp(21px,2.6vw,27px);letter-spacing:-.01em;color:var(--ink);margin:9px 0 6px;line-height:1.15}
.conv-sub{font-size:14.5px;color:var(--muted);font-weight:600;margin-bottom:22px;line-height:1.45}
.conv-steps{font-size:12px;font-weight:700;letter-spacing:.02em;color:var(--muted);margin-bottom:16px}
.conv-form{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.conv-field{display:flex;flex-direction:column;gap:6px}
.conv-field.full{grid-column:1/-1}
.conv-field label{font-size:12.5px;font-weight:700;color:var(--ink-soft)}
.conv-field label .req{color:var(--orange)}
.conv-field input,.conv-field select,.conv-field textarea{font-family:inherit;font-size:15px;color:var(--ink);background:var(--paper-2);border:1.5px solid var(--line);border-radius:11px;padding:12px 14px;outline:none;transition:border-color .15s ease,background .15s ease;width:100%}
.conv-field textarea{resize:vertical;min-height:82px}
.conv-field input:focus,.conv-field select:focus,.conv-field textarea:focus{border-color:var(--orange);background:var(--white)}
.conv-field.err input,.conv-field.err select,.conv-field.err textarea{border-color:#d64545;background:#fdf3f3}
.conv-errmsg{font-size:12px;color:#d64545;font-weight:600;display:none}
.conv-field.err .conv-errmsg{display:block}
.conv-actions{grid-column:1/-1;display:flex;align-items:center;gap:14px;margin-top:6px}
.conv-submit{background:var(--orange);color:#fff;font-weight:800;font-size:15px;border:none;border-radius:12px;padding:14px 26px;cursor:pointer;transition:transform .15s,box-shadow .15s;display:inline-flex;align-items:center;gap:10px}
.conv-submit:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(232,81,30,.3)}
.conv-submit:disabled{opacity:.65;cursor:default;transform:none;box-shadow:none}
.conv-ghost{background:none;border:none;color:var(--muted);font-weight:700;font-size:14px;cursor:pointer;padding:6px 4px}
.conv-ghost:hover{color:var(--ink)}
.conv-spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.5);border-top-color:#fff;border-radius:50%;animation:convspin .7s linear infinite}
@keyframes convspin{to{transform:rotate(360deg)}}
.conv-note{grid-column:1/-1;font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px}
.conv-hp{position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;pointer-events:none}
.conv-hub{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:760px;margin:26px auto 0}
.conv-hub button{text-align:left;background:var(--white);border:1px solid var(--line);border-radius:14px;padding:18px 20px;cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s;font-family:inherit}
.conv-hub button:hover{border-color:var(--orange);transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.06)}
.conv-hub .ht{font-weight:800;font-size:16px;color:var(--ink)}
.conv-hub .hs{font-size:13px;color:var(--muted);font-weight:600;margin-top:4px;line-height:1.4}
.conv-success{text-align:center;padding:16px 6px 6px}
.conv-success h3{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:800;font-size:24px;color:var(--ink);margin:18px 0 10px}
.conv-success p{font-size:15px;color:var(--muted);font-weight:600;max-width:400px;margin:0 auto 22px;line-height:1.5}
@media (max-width:560px){.conv-form,.conv-hub{grid-template-columns:1fr}.conv-panel{padding:30px 22px}}

  '<article class="card reveal" style="border:none;margin-bottom:34px"><span class="res-tag bench">'+esc(f.tag)+'</span><h2 class="display" style="font-size:26px;margin:8px 0 8px">'+esc(f.title)+'</h2><p class="lead" style="margin:0 0 18px">'+esc(f.dek)+'</p>'+
    '<div class="grid-2">'+f.secs.map(function(s){return '<div class="cli-out"><b>'+esc(s[0])+'</b>'+esc(s[1])+'</div>';}).join('')+'</div>'+
    '<p style="margin-top:14px;font-size:11.5px;color:var(--muted);font-style:italic;font-weight:600">'+esc(f.note)+'</p>'+
  '</article>'+
  '<div class="sec-head center reveal" style="margin-bottom:22px"><span class="eyebrow">'+esc(ins.biblioT)+'</span><h2 class="display" style="font-size:26px">'+esc(ins.biblioSub)+'</h2></div>'+
  '<div class="grid-3">'+BIBLIO.map(function(a){return '<a class="card reveal biblio-card" href="'+a.u+'" target="_blank" rel="noopener"><span class="res-tag bench">'+esc(a.d)+'</span><h4>'+esc(a.t)+'</h4><p>'+esc(a.s)+'</p><span class="biblio-read">'+esc(ins.readLabel)+'</span></a>';}).join('')+'</div>'+
  '</div></section>'+ ctaBlock(t,t.home.ctaTitle,t.home.ctaHl);
}

function pRoadmap(t){
  var r=t.roadmap, cols=["var(--navy)","var(--purple)","var(--teal)","var(--orange)","var(--maroon)"];
  return '<section class="section"><div class="wrap">'+
    '<div class="sec-head center reveal"><span class="eyebrow">'+esc(r.eyebrow)+'</span><h1 class="display">'+esc(r.title)+'</h1><p>'+esc(r.sub)+'</p></div>'+
    '<div class="center" style="margin-bottom:14px"><span class="res-tag bench">'+esc(r.assetsH)+'</span></div>'+
    '<div class="rmap-assets reveal">'+r.assets.map(function(a,i){return '<span class="rmap-asset"><i class="rn" style="background:'+cols[i]+'">'+(i+1)+'</i>'+esc(a)+'</span>'+(i<r.assets.length-1?'<span class="rmap-sep">→</span>':'');}).join('')+'</div>'+
    '<div class="rmap-grid">'+r.phases.map(function(p,i){return '<div class="rmap-card reveal" style="--c:'+cols[i]+'">'+
        '<div class="rmap-top"><span class="ph">'+esc(p.ph)+'</span></div>'+
        '<h4>'+esc(p.name)+'</h4><div class="layer">'+esc(p.layer)+'</div>'+
        '<p>'+esc(p.d)+'</p>'+
        '<div class="rmap-out"><b>'+esc(r.outLabel)+'</b>'+esc(p.out)+'</div>'+
        '<div class="rmap-prod">'+esc(p.prod)+'</div>'+
      '</div>';}).join('')+'</div>'+
    '<p class="center reveal rmap-foot" style="margin-top:26px;font-weight:700;color:var(--ink-soft);font-size:15px">'+esc(r.foot)+'</p>'+
  '</div></section>'+ ctaBlock(t,t.home.ctaTitle,t.home.ctaHl);
}

function pContacto(t){
  var c=t.contact;
  var hub=['demo','expert','pilot','partner','newsletter'].map(function(k){return '<button data-conv="'+k+'"><div class="ht">'+esc(CL(CONVERSION_CONFIG[k].title))+'</div><div class="hs">'+esc(CL(CONVERSION_CONFIG[k].sub))+'</div></button>';}).join('');
  return '<section class="section cta"><div class="wrap">'+
    '<div class="sec-head center reveal" style="max-width:820px;margin-left:auto;margin-right:auto"><span class="eyebrow">'+esc(c.eyebrow)+'</span><h1 class="display">'+esc(c.title)+'<span class="hl">'+esc(c.hl)+'</span></h1><p style="font-size:18px;color:var(--ink-soft)">'+esc(c.sub)+'</p></div>'+
    '<div class="conv-hub reveal">'+hub+'</div>'+
    '<div class="contact-card reveal" style="margin-top:36px"><div class="name">Fernando Pérez S.</div><div class="row" style="margin-top:16px">'+
      '<a href="tel:+56998223080"><span class="ic">✆</span> +56 9 9822 3080</a>'+
      '<a href="mailto:contacto@temporispro.com"><span class="ic">✉</span> contacto@temporispro.com</a>'+
    '</div></div>'+
  '</div></section>';
}

function ctaBlock(t,title,hl){
  return '<section class="section cta"><div class="wrap">'+
    '<div class="sec-head reveal" style="max-width:820px"><h2 class="display">'+esc(title)+'<span class="hl">'+esc(hl)+'</span></h2></div>'+
    '<div class="cta-row"><a class="btn btn-primary" data-conv="demo">'+esc(t.common.demo)+'</a><a class="btn btn-light" data-nav="ecosistema">'+esc(t.common.ver_eco)+'</a></div>'+
  '</div></section>';
}

  function ensureRoot(){if(root)return;root=document.createElement("div");root.className="conv-back";root.setAttribute("role","dialog");root.setAttribute("aria-modal","true");root.innerHTML='<div class="conv-panel"><button class="conv-close" aria-label="Cerrar">×</button><div class="conv-body"></div></div>';document.body.appendChild(root);
    root.addEventListener("click",function(e){if(e.target===root)close();var c=e.target.closest(".conv-close");if(c)close();});
    document.addEventListener("keydown",function(e){if(e.key==="Escape"&&root&&root.classList.contains("on"))close();});
  }
  function fieldHTML(f){var lbl=CL(f.label)+(f.req?' <span class="req">*</span>':'');var inner;
    if(f.type==="select"){inner='<select data-in><option value="">—</option>'+f.opts.map(function(o){return '<option>'+CL(o)+'</option>';}).join('')+'</select>';}
    else if(f.type==="textarea"){inner='<textarea data-in rows="3"></textarea>';}
    else{var it=(f.type==="email"?"email":f.type==="tel"?"tel":f.type==="number"?"number":"text");inner='<input data-in type="'+it+'">';}
    return '<div class="conv-field'+(f.full?' full':'')+'" data-key="'+f.key+'" data-type="'+f.type+'" data-req="'+(f.req?1:0)+'"><label>'+lbl+'</label>'+inner+'<span class="conv-errmsg"></span></div>';}
  function currentFields(cfg){return cfg.steps?cfg.steps[curStep]:cfg.fields;}
  function render(){var cfg=CONVERSION_CONFIG[curType];var body=root.querySelector(".conv-body");var fields=currentFields(cfg);
    var stepsInfo=cfg.steps?'<div class="conv-steps">'+(convLang()==="en"?"Step":"Paso")+' '+(curStep+1)+' / '+cfg.steps.length+'</div>':'';
    var lastStep=!cfg.steps||curStep===cfg.steps.length-1;
    var primaryLabel=lastStep?CL(cfg.submit):(convLang()==="en"?"Continue":"Continuar");
    var backBtn=(cfg.steps&&curStep>0)?'<button type="button" class="conv-ghost" data-back>'+(convLang()==="en"?"Back":"Atrás")+'</button>':'';
    body.innerHTML='<span class="conv-eye">'+CL(cfg.eye)+'</span><h3 class="conv-title">'+CL(cfg.title)+'</h3><p class="conv-sub">'+CL(cfg.sub)+'</p>'+stepsInfo+
      '<form class="conv-form" novalidate>'+fields.map(fieldHTML).join('')+
      '<input class="conv-hp" type="text" tabindex="-1" autocomplete="off" aria-hidden="true" data-hp>'+
      '<div class="conv-actions">'+backBtn+'<button type="submit" class="conv-submit">'+primaryLabel+'</button></div>'+
      '<div class="conv-note">'+(convLang()==="en"?"We never share your data. No spam.":"No compartimos tus datos. Sin spam.")+'</div></form>';
    var form=body.querySelector("form");
    form.querySelectorAll("[data-in]").forEach(function(inp){var fld=inp.closest(".conv-field");if(collected[fld.getAttribute("data-key")]!=null)inp.value=collected[fld.getAttribute("data-key")];inp.addEventListener("input",function(){fld.classList.remove("err");});});
    var bk=body.querySelector("[data-back]");if(bk)bk.addEventListener("click",function(){saveStep(form);curStep--;render();});
    form.addEventListener("submit",function(e){e.preventDefault();onSubmit(form,cfg,lastStep);});
    var first=form.querySelector("[data-in]");if(first)try{first.focus();}catch(e){}
  }
  function saveStep(form){form.querySelectorAll(".conv-field").forEach(function(fld){var inp=fld.querySelector("[data-in]");collected[fld.getAttribute("data-key")]=inp.value;});}
  function validate(form){var ok=true;form.querySelectorAll(".conv-field").forEach(function(fld){var inp=fld.querySelector("[data-in]");var req=fld.getAttribute("data-req")==="1";var type=fld.getAttribute("data-type");var v=inp.value;var msg="";
    if(req&&!FormValidation.required(v)){msg=convLang()==="en"?"Required field":"Campo requerido";}
    else if(type==="email"&&v&&!FormValidation.email(v)){msg=convLang()==="en"?"Invalid email":"Correo inválido";}
    if(msg){ok=false;fld.classList.add("err");fld.querySelector(".conv-errmsg").textContent=msg;}else{fld.classList.remove("err");}});
    return ok;}
  function onSubmit(form,cfg,lastStep){if(!validate(form))return;saveStep(form);
    if(!lastStep){curStep++;render();return;}
    var btn=form.querySelector(".conv-submit");btn.disabled=true;var lbl=btn.innerHTML;btn.innerHTML='<span class="conv-spin"></span>'+(convLang()==="en"?"Sending…":"Enviando…");
    AnalyticsService.track(cfg.event,{source:curType});
    var hp=(form.querySelector("[data-hp]")||{}).value||"";var formMs=openedAt?(Date.now()-openedAt):0;
    LeadService.capture(curType,Object.assign({},collected),{hp:hp,formMs:formMs}).then(function(){AnalyticsService.track(T.contactDone,{source:curType});success(cfg);}).catch(function(){btn.disabled=false;btn.innerHTML=lbl;var f=form.querySelector(".conv-field");if(f){f.classList.add("err");f.querySelector(".conv-errmsg").textContent=convLang()==="en"?"Something went wrong. Try again.":"Ocurrió un problema. Intenta de nuevo.";}});}
  function success(cfg){var body=root.querySelector(".conv-body");
    body.innerHTML='<div class="conv-success"><svg width="72" height="72" viewBox="0 0 72 72" aria-hidden="true"><circle cx="36" cy="36" r="34" fill="none" stroke="#e8531f" stroke-width="3" opacity="0.25"/><circle cx="36" cy="36" r="34" fill="#fdeee7"/><path d="M23 37l9 9 17-19" fill="none" stroke="#e8531f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
      '<h3>'+(convLang()==="en"?"Thank you.":"Gracias.")+'</h3><p>'+(convLang()==="en"?"Your request has been successfully received. One of our Operational Intelligence specialists will contact you shortly.":"Recibimos tu solicitud. Uno de nuestros especialistas en Operational Intelligence te contactará en breve.")+'</p>'+
      '<button type="button" class="conv-submit" data-done>'+(convLang()==="en"?"Close":"Cerrar")+'</button></div>';
    body.querySelector("[data-done]").addEventListener("click",close);}
  function open(type){if(!CONVERSION_CONFIG[type])return;ensureRoot();curType=type;curStep=0;collected={};openedAt=Date.now();render();requestAnimationFrame(function(){root.classList.add("on");});document.body.style.overflow="hidden";AnalyticsService.track(T.contactStart,{source:type});}
  function close(){if(!root)return;root.classList.remove("on");document.body.style.overflow="";}
  return {open:open,close:close};
})();
var Conversion=ConversionLayer;

/* events */
document.addEventListener("click",function(e){
  var cv=e.target.closest("[data-conv]");
  if(cv){e.preventDefault();Conversion.open(cv.getAttribute("data-conv"));return;}
  var n=e.target.closest("[data-nav]");
  if(n){e.preventDefault();location.hash="#/"+n.getAttribute("data-nav");document.getElementById("navlinks").classList.remove("open");}
});
document.getElementById("lang").addEventListener("click",function(e){
  var b=e.target.closest("button[data-lang]");if(!b)return;lang=b.getAttribute("data-lang");render();
});
document.getElementById("burger").addEventListener("click",function(){document.getElementById("navlinks").classList.toggle("open");});
// flip cards (click y teclado)
document.addEventListener("click",function(e){var f=e.target.closest(".flip-card");if(f)f.classList.toggle("flipped");});
document.addEventListener("keydown",function(e){if(e.key==="Enter"||e.key===" "||e.key==="Spacebar"){var f=document.activeElement;if(f&&f.classList&&f.classList.contains("flip-card")){e.preventDefault();f.classList.toggle("flipped");}}});
window.addEventListener("hashchange",render);
if(!location.hash) location.hash="#/home";
render();
</script>
